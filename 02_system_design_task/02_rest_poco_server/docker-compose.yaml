services:
  # Основной API сервер
  car_rental_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: car_rental_api
    ports:
      - "8081:8080"
    environment:
      PORT: 8080
      LOG_LEVEL: information
      JWT_SECRET: ${JWT_SECRET:-super_secret_key_change_in_production}
    restart: unless-stopped